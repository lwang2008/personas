total:
  source: >
    Distributions estimated from Gallup, Pew Research Center, Kaiser Family Foundation,
    and YouGov polling data (2023-2025).
    Conditionals reflect group-level polling averages; individual scores are sampled
    from within the indicated bucket range in main.py.
  notes: >
    Each issue is scored on a spectrum from -1.0 (strongly oppose) to +1.0 (strongly support).
    Bucket ranges are defined in score_buckets. Conditionals are keyed by demographic attribute
    then demographic value; any attribute without a conditional falls back to the marginal.
    Orientation values must match demographics.yaml schema: straight, gay, bi, other.

score_buckets:
  strongly_support: [0.60, 1.00]
  support:          [0.20, 0.60]
  neutral:          [-0.20, 0.20]
  oppose:           [-0.60, -0.20]
  strongly_oppose:  [-1.00, -0.60]

